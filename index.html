<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TIMBER Score Tracker</title>
<style>
body {
  font-family: Arial, sans-serif;
  background-color: #f4f4f4;
  padding: 20px;
  text-align: center;
}
.container {
  max-width: 600px;
  margin: auto;
  background: white;
  padding: 20px;
  border-radius: 10px;
  box-shadow: 0 0 10px rgba(0,0,0,0.1);
}
input, select, button {
  width: 100%;
  padding: 10px;
  margin: 6px 0;
  font-size: 16px;
  box-sizing: border-box;
}
button {
  background-color: #2e86de;
  color: white;
  border: none;
  border-radius: 5px;
  cursor: pointer;
}
button:hover { background-color: #1b4f72; }
#resetBtn { background-color: #e74c3c; display: none; margin-bottom: 20px;} 
#historyBtn { background-color: #f39c12; margin-bottom: 20px;}
#historyBtn:hover { background-color: #d68910; }

table { width: 100%; border-collapse: collapse; margin-top: 20px;}
th, td { border: 1px solid #ddd; padding: 8px; text-align: center; }
th { background-color: #2e86de; color: white; }
.eliminated { color: red; font-weight: bold; }
.winner { color: green; font-weight: bold; font-size: 18px; }

/* Modal (Dialog Box) CSS */
.modal {
  display: none; 
  position: fixed; 
  z-index: 10; 
  left: 0; 
  top: 0; 
  width: 100%; 
  height: 100%; 
  background-color: rgba(0,0,0,0.6); 
}
.modal-content {
  background-color: #fff;
  margin: 10% auto;
  padding: 20px;
  border-radius: 10px;
  width: 90%;
  max-width: 500px;
  text-align: left;
  max-height: 70vh;
  overflow-y: auto;
}
.close {
  color: #aaa;
  float: right;
  font-size: 28px;
  font-weight: bold;
  cursor: pointer;
}
.close:hover { color: black; }
.history-item {
  background: #f9f9f9;
  border: 1px solid #ddd;
  padding: 10px;
  margin-bottom: 10px;
  border-radius: 5px;
  cursor: pointer;
}
.history-item:hover { background: #eef; border-color: #2e86de; }
</style>
</head>

<body>

<div class="container">
<h2>TIMBER Score Tracker</h2>

<div id="setupArea">
  <button id="historyBtn" onclick="openHistoryModal()">📂 View Game History</button>
  <hr>
  <label for="numPlayers">Number of Players</label>
  <select id="numPlayers" onchange="createPlayerInputs()">
    <option value="2">2 Players</option>
    <option value="3" selected>3 Players</option>
    <option value="4">4 Players</option>
    <option value="5">5 Players</option>
    <option value="6">6 Players</option>
    <option value="7">7 Players</option>
    <option value="8">8 Players</option>
  </select>

  <div id="playerNamesDiv"></div>
  <button onclick="startGame()">Start New Game</button>
</div>

<button id="resetBtn" onclick="resetGame()">Start Fresh / Exit Game</button>
<div id="gameArea"></div>
</div>

<div id="historyModal" class="modal">
  <div class="modal-content">
    <span class="close" onclick="closeHistoryModal()">&times;</span>
    <h2>Saved Games History</h2>
    <div id="historyList"></div>
  </div>
</div>

<script>
let totals = [];
let round = 1;
let playerNames = [];
let numPlayers = 3;
let eliminated = [];
let scoreHistory = [];
let currentGameId = null; // Har game ko unique ID dene ke liye

function saveGameState() {
  let history = JSON.parse(localStorage.getItem('timberGameHistoryList')) || [];
  
  // Agar naya game hai toh current timestamp ko ID banao
  if (!currentGameId) {
    currentGameId = new Date().getTime();
  }

  const gameState = {
    id: currentGameId,
    date: new Date().toLocaleString(),
    totals: totals,
    round: round,
    playerNames: playerNames,
    numPlayers: numPlayers,
    eliminated: eliminated,
    scoreHistory: scoreHistory
  };

  // Check karo agar ye game pehle se history mein hai toh update karo, warna naya add karo
  const existingIndex = history.findIndex(g => g.id === currentGameId);
  if (existingIndex !== -1) {
    history[existingIndex] = gameState;
  } else {
    history.push(gameState);
  }

  localStorage.setItem('timberGameHistoryList', JSON.stringify(history));
}

function createPlayerInputs() {
  numPlayers = parseInt(document.getElementById('numPlayers').value);
  const div = document.getElementById('playerNamesDiv');
  div.innerHTML = '';
  for (let i = 0; i < numPlayers; i++) {
    const input = document.createElement('input');
    input.placeholder = `Player ${i+1} name`;
    input.id = `p${i}`;
    div.appendChild(input);
  }
}

// Page load hone par input boxes banao
createPlayerInputs();

function startGame() {
  currentGameId = null; // Naya game start ho raha hai, toh ID reset
  playerNames = [];
  totals = [];
  eliminated = [];
  scoreHistory = [];
  round = 1;

  for(let i=0;i<numPlayers;i++){
    let name = document.getElementById(`p${i}`).value.trim();
    if(!name) name = `Player ${i+1}`;
    playerNames.push(name);
    totals.push(0);
    eliminated.push(false);
  }

  document.getElementById('setupArea').style.display = 'none';
  document.getElementById('resetBtn').style.display = 'block';

  saveGameState(); // Game save karo
  renderRoundInput();
  renderTable();
}

function renderRoundInput(){
  let html = `<hr><h3>Round ${round}</h3>`;
  for(let i=0;i<numPlayers;i++){
    if(eliminated[i]){
      html += `<p><strong class="eliminated">${playerNames[i]} is eliminated</strong></p>`;
    } else {
      html += `<input type="number" id="s${i}" placeholder="${playerNames[i]} score" min="0">`;
    }
  }
  html += `<button onclick="addRound()">Add Round</button>`;
  document.getElementById('gameArea').innerHTML = html;
}

function addRound(){
  const roundScores = [];
  for(let i=0;i<numPlayers;i++){
    if(eliminated[i]){
      roundScores.push('-');
      continue;
    }

    let val = parseInt(document.getElementById(`s${i}`).value) || 0;
    totals[i] += val;

    if(totals[i] === 50 || totals[i] === 100){
      totals[i] = Math.floor(totals[i]/2);
      alert(`${playerNames[i]}'s total reached ${totals[i]*2} and is halved to ${totals[i]}`);
    }

    if(totals[i] > 100){
      eliminated[i] = true;
      alert(`${playerNames[i]} eliminated!`);
    }
    roundScores.push(val);
  }

  scoreHistory.push(roundScores);

  const remaining = playerNames.filter((_,i)=>!eliminated[i]);
  if(remaining.length === 1){
    alert(`${remaining[0]} is the winner! 🎉`);
    document.getElementById('gameArea').innerHTML = `<h2 class="winner">${remaining[0]} WINS THE GAME! 🎉</h2>`;
    renderTable();
    saveGameState();
    return;
  }

  round++;
  saveGameState(); // Round ke baad save karo
  renderRoundInput();
  renderTable();
}

function renderTable(){
  let html = `<table><thead><tr><th>Round</th>`;
  for(let i=0;i<numPlayers;i++){
    html += `<th>${playerNames[i]}</th>`;
  }
  html += `</tr></thead><tbody>`;

  for(let r=0;r<scoreHistory.length;r++){
    html += `<tr><td>${r+1}</td>`;
    for(let i=0;i<numPlayers;i++){
      let val = scoreHistory[r][i];
      html += `<td>${val}</td>`;
    }
    html += `</tr>`;
  }
  html += `</tbody><tfoot><tr><th>Total</th>`;
  for(let i=0;i<numPlayers;i++){
    html += `<th>${totals[i]} ${eliminated[i]?'<span class="eliminated">(Eliminated)</span>':''}</th>`;
  }
  html += `</tr></tfoot></table>`;

  document.getElementById('gameArea').innerHTML += html;
}

function resetGame(){
  if(confirm("Do you want to exit the current game and go to the main menu? (Progress is saved in History)")) {
    currentGameId = null;
    document.getElementById('gameArea').innerHTML = '';
    document.getElementById('setupArea').style.display = 'block'; 
    document.getElementById('resetBtn').style.display = 'none'; 
  }
}

// ---- Modal / History Functions ----

function openHistoryModal() {
  let history = JSON.parse(localStorage.getItem('timberGameHistoryList')) || [];
  let listDiv = document.getElementById('historyList');
  listDiv.innerHTML = '';

  if (history.length === 0) {
    listDiv.innerHTML = '<p>No saved games found. Play a game first!</p>';
  } else {
    // Sabse naya game sabse upar dikhane ke liye reverse()
    history.slice().reverse().forEach(game => {
      let div = document.createElement('div');
      div.className = 'history-item';
      div.innerHTML = `
        <strong>Started/Played:</strong> ${game.date} <br>
        <strong>Players:</strong> ${game.playerNames.join(', ')} <br>
        <strong>Rounds Played:</strong> ${game.round - 1}
      `;
      // Click karne par purana game load ho jayega
      div.onclick = () => loadGameFromHistory(game.id);
      listDiv.appendChild(div);
    });
  }
  document.getElementById('historyModal').style.display = 'block';
}

function closeHistoryModal() {
  document.getElementById('historyModal').style.display = 'none';
}

function loadGameFromHistory(id) {
  let history = JSON.parse(localStorage.getItem('timberGameHistoryList')) || [];
  let game = history.find(g => g.id === id);
  
  if(game) {
    currentGameId = game.id;
    totals = game.totals;
    round = game.round;
    playerNames = game.playerNames;
    numPlayers = game.numPlayers;
    eliminated = game.eliminated;
    scoreHistory = game.scoreHistory;

    closeHistoryModal(); // Dialog box band karo
    document.getElementById('setupArea').style.display = 'none';
    document.getElementById('resetBtn').style.display = 'block';

    const remaining = playerNames.filter((_,i)=>!eliminated[i]);
    if(remaining.length === 1){
      document.getElementById('gameArea').innerHTML = `<h2 class="winner">${remaining[0]} WINS THE GAME! 🎉</h2>`;
      renderTable();
    } else {
      renderRoundInput();
      renderTable();
    }
  }
}

// Background pe click karne par bhi modal band ho jaye
window.onclick = function(event) {
  let modal = document.getElementById('historyModal');
  if (event.target == modal) {
    modal.style.display = "none";
  }
}
</script>

</body>
</html>
